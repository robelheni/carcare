<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarCare - Vehicle Details</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <h1>🚗 CarCare</h1>
            <div class="user-info">
                <a href="/dashboard" class="back-link">← Back to Dashboard</a>
                <button id="logoutBtn" class="btn-secondary">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">
            
            <!-- Vehicle Info -->
            <section class="card">
                <h2 id="vehicleName">Loading...</h2>
                <div id="vehicleDetails"></div>
            </section>

            <!-- Add Maintenance Log -->
            <section class="card">
                <h2>Add Service Log</h2>
                <form id="addLogForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Service Type *</label>
                            <select id="log-type" required>
                                <option value="">Select...</option>
                                <option value="oil_change">Oil Change</option>
                                <option value="brake_service">Brake Service</option>
                                <option value="mot">MOT</option>
                                <option value="tire_rotation">Tire Rotation</option>
                                <option value="general_service">General Service</option>
                                <option value="repair">Repair</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="log-date" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Mileage *</label>
                            <input type="number" id="log-mileage" placeholder="e.g. 46500" required>
                        </div>
                        <div class="form-group">
                            <label>Cost</label>
                            <input type="number" id="log-cost" placeholder="e.g. 45.99" step="0.01">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Notes</label>
                        <textarea id="log-notes" rows="3" placeholder="Any additional details..."></textarea>
                    </div>

                    <button type="submit">Add Service Log</button>
                    <p id="addLogMessage"></p>
                </form>
            </section>

            <!-- Maintenance History -->
            <section class="card">
                <h2>Service History</h2>
                <div id="logsList">
                    <p class="loading">Loading logs...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
