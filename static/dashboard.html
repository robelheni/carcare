<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarCare - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <h1>🚗 CarCare</h1>
            <div class="user-info">
                <span>Welcome, <strong id="username"></strong>!</span>
                <button id="logoutBtn" class="btn-secondary">Logout</button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">

            <!-- NEW: Dashboard Stats -->
            <section class="stats-container">
                <div class="stat-card">
                    <div class="stat-icon">🚗</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalVehicles">0</div>
                        <div class="stat-label">Vehicles</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">🔧</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalLogs">0</div>
                        <div class="stat-label">Services</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-content">
                        <div class="stat-value" id="totalSpent">£0.00</div>
                        <div class="stat-label">Total Spent</div>
                    </div>
                </div>
            </section>

            <!-- Recent Activity -->
            <section class="card">
                <h2>Recent Activity</h2>
                <div id="recentActivity">
                    <p class="loading">Loading...</p>
                </div>
            </section>
            
            <!-- Add Vehicle Section -->
            <section class="card">
                <h2>Add New Vehicle</h2>
                <form id="addVehicleForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Vehicle Name *</label>
                            <input type="text" id="vehicle-name" placeholder="e.g. My Honda Civic" required>
                        </div>
                        <div class="form-group">
                            <label>Registration</label>
                            <input type="text" id="vehicle-registration" placeholder="e.g. AB12 CDE">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Current Mileage *</label>
                            <input type="number" id="vehicle-mileage" placeholder="e.g. 45000" required>
                        </div>
                        <div class="form-group">
                            <label>Year</label>
                            <input type="number" id="vehicle-year" placeholder="e.g. 2018" min="1900" max="2030">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Fuel Type</label>
                            <select id="vehicle-fuel-type">
                                <option value="">Select...</option>
                                <option value="Petrol">Petrol</option>
                                <option value="Diesel">Diesel</option>
                                <option value="Electric">Electric</option>
                                <option value="Hybrid">Hybrid</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Add Vehicle</button>
                    <p id="addVehicleMessage"></p>
                </form>
            </section>

            <!-- Vehicles List -->
            <section class="card">
                <h2>My Vehicles</h2>
                <div id="vehiclesList">
                    <p class="loading">Loading vehicles...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
